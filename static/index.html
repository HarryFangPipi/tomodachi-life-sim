    }
    // Office: glass curtain wall reflection bands
    if (locKey === 'office') {
      ctx.strokeStyle = 'rgba(160,225,255,0.35)'; ctx.lineWidth = 0.9;
      const bands = Math.max(2, Math.round(FH / 6));
      for (let bi = 1; bi < bands; bi++) {
        const fy = FH * bi / bands;
        ctx.beginPath(); ctx.moveTo(sX, sY - fy); ctx.lineTo(eX, eY - fy); ctx.stroke();
      }
    }
    ctx.restore();
  }
}

// ─────────────────────────────────────────────────────────────
// Kairosoft-style triangular peaked roof for an entire building.
// Drawn ONCE per building (not per-tile) after all facades are done.
// ─────────────────────────────────────────────────────────────
function drawBuildingRoof(locKey, bounds) {
  const roofColor = ROOF_COLORS[locKey];
  if (!roofColor) return;            // open plaza / park → no roof
  const { minC, maxC, minR, maxR } = bounds;

  const tw = TILE_W, th = TILE_H;

  // Building-footprint diamond corners in screen space.
  // isoToScreen returns the TOP corner of a tile diamond.
  //   N corner (back)   = top corner of tile (minC, minR)
  //   E corner (right)  = right corner of tile (maxC, minR) = isoToScreen(maxC, minR) + (tw/2, th/2)
  //   S corner (front)  = bottom corner of tile (maxC, maxR) = isoToScreen(maxC, maxR) + (0, th)
  //   W corner (left)   = left corner of tile (minC, maxR) = isoToScreen(minC, maxR) + (-tw/2, th/2)
  const n = isoToScreen(minC, minR);
  const e = isoToScreen(maxC, minR);
  const s = isoToScreen(maxC, maxR);
  const w = isoToScreen(minC, maxR);
  const N = { x: n.x,             y: n.y };
  const E = { x: e.x + tw/2,      y: e.y + th/2 };
  const S = { x: s.x,             y: s.y + th };
  const W = { x: w.x - tw/2,      y: w.y + th/2 };

  // Roof peak height — scales with building "size" (max span in tiles)
  // and with current zoom (TILE_H). Keep within [12, ~2*TILE_H] px.
  const span = Math.max(maxC - minC + 1, maxR - minR + 1);
  const roofH = Math.max(12, Math.round(th * 0.55 * Math.min(span, 3) + th * 0.25));

  // Ridge endpoints — horizontal segment at y = (W.y or E.y) − roofH,
  // running from the screen-X of W to the screen-X of E.
  // W.y === E.y (both at the "equator" of the footprint diamond).
  const ridgeY  = W.y - roofH;
  const ridgeL  = { x: W.x, y: ridgeY };
  const ridgeR  = { x: E.x, y: ridgeY };

  // Slope colors: back slope (north-facing) is lit, front slope (south-facing) is shadowed.
  const lit    = lighten(roofColor, 1.15);   // ≈ +15 % brightness
  const shadow = darken(roofColor, 0.80);    // ≈ −20 % brightness
  const stroke = darken(roofColor, 0.45);    // outline

  ctx.save();
  ctx.lineJoin = 'miter';
  ctx.lineCap  = 'round';
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = stroke;

  // ── BACK slope (LIT, north-facing) ──
  // Pentagon: W → ridgeL → ridgeR → E → N → W
  // The bottom edge (W→N→E) traces the back perimeter of the footprint diamond.
  ctx.beginPath();
  ctx.moveTo(W.x,        W.y);
  ctx.lineTo(ridgeL.x,   ridgeL.y);
  ctx.lineTo(ridgeR.x,   ridgeR.y);
  ctx.lineTo(E.x,        E.y);
  ctx.lineTo(N.x,        N.y);
  ctx.closePath();
  ctx.fillStyle = lit;
  ctx.fill();
  ctx.stroke();

  // ── FRONT slope (SHADOW, south-facing) ──
  // Pentagon: W → S → E → ridgeR → ridgeL → W
  ctx.beginPath();
  ctx.moveTo(W.x,        W.y);
  ctx.lineTo(S.x,        S.y);
  ctx.lineTo(E.x,        E.y);
  ctx.lineTo(ridgeR.x,   ridgeR.y);
  ctx.lineTo(ridgeL.x,   ridgeL.y);
  ctx.closePath();
  ctx.fillStyle = shadow;
  ctx.fill();
  ctx.stroke();

  // ── Ridge highlight ── (draw last so it sits on top of both slopes)
  ctx.beginPath();
  ctx.moveTo(ridgeL.x, ridgeL.y);
  ctx.lineTo(ridgeR.x, ridgeR.y);
  ctx.strokeStyle = darken(roofColor, 0.55);
  ctx.lineWidth   = 1.8;
  ctx.stroke();

  // Subtle horizontal pixel-tile rows on the lit slope for that Kairosoft texture
  // (only at decent zoom)
  if (tw >= 32) {
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(W.x, W.y);
    ctx.lineTo(ridgeL.x, ridgeL.y);
    ctx.lineTo(ridgeR.x, ridgeR.y);
    ctx.lineTo(E.x, E.y);
    ctx.lineTo(N.x, N.y);
    ctx.closePath();
    ctx.clip();
    ctx.strokeStyle = 'rgba(0,0,0,0.18)';
    ctx.lineWidth   = 0.8;
    const rows = Math.max(2, Math.round(roofH / 6));
    for (let i = 1; i < rows; i++) {
      const t = i / rows;
      const y = W.y + (ridgeY - W.y) * t;
      ctx.beginPath();
      ctx.moveTo(W.x, y);
      ctx.lineTo(E.x, y);
      ctx.stroke();
    }
    ctx.restore();

    // Same on shadow slope
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(W.x, W.y);
    ctx.lineTo(S.x, S.y);
    ctx.lineTo(E.x, E.y);
    ctx.lineTo(ridgeR.x, ridgeR.y);
    ctx.lineTo(ridgeL.x, ridgeL.y);
    ctx.closePath();
    ctx.clip();
    ctx.strokeStyle = 'rgba(0,0,0,0.28)';
    ctx.lineWidth   = 0.8;
    const rows2 = Math.max(2, Math.round(roofH / 6));
    for (let i = 1; i < rows2; i++) {
      const t = i / rows2;
      const y = W.y + (ridgeY - W.y) * t;
      ctx.beginPath();
      ctx.moveTo(W.x, y);
      ctx.lineTo(E.x, y);
      ctx.stroke();
    }
    ctx.restore();
  }

  ctx.restore();
}

function drawFloorTile(sx, sy, col, row) {
  const tw = TILE_W, th = TILE_H;
  const locKey = tileLocMap[`${col},${row}`] || 'office';
  const floorC = FLOOR_C[locKey] || '#EDE0C8';
  // Base diamond (serves as fallback if texture not yet loaded)
  const alt = (col+row) % 2;
  isoDiamond(sx, sy, alt ? '#EDE0C8' : '#F5EDD8', 'rgba(180,140,80,0.2)', 0.4);
  // Overlay location-specific floor texture (same as drawBuildingTile)
  if (tw >= 22) _roofFloor(locKey, sx, sy, tw, th, floorC);
}

function drawTreeTile(sx, sy, col, row) {
  const tw = TILE_W, th = TILE_H;
  // Ground base — use grass texture, fallback to solid color
  ctx.save();
  ctx.imageSmoothingEnabled = false;
  const _gImg = tileImages.grass;
  if (_gImg?.complete && _gImg.naturalWidth > 0) {
    ctx.beginPath();
    ctx.moveTo(sx, sy); ctx.lineTo(sx+tw/2, sy+th/2);
    ctx.lineTo(sx, sy+th); ctx.lineTo(sx-tw/2, sy+th/2);
    ctx.closePath(); ctx.clip();
    ctx.drawImage(_gImg, Math.round(sx - tw/2), Math.round(sy), tw, th);
  } else {
    isoDiamond(sx, sy, '#C8B060', null);
  }
  ctx.restore();

  // Trunk and crown are drawn in a separate pass (drawGrid Pass 1.5)
  // so they are never covered by subsequent ground tile diamonds.
}

// Draw trunk + crown only — called after all ground tiles are done.
function drawTreeTrunkCrown(sx, sy, col, row) {
  const tw = TILE_W, th = TILE_H;
  const seed = (col*1637+row*431)|0;
  const treeH  = Math.round(th * (2.0 + (Math.abs(seed)%4)*0.15));
  const crownR = Math.round(tw * (0.30 + (Math.abs(seed)%3)*0.04));

  // Shared anchor — tile's isometric screen centre (same point for trunk and crown)
  const bx = Math.round(sx);
  const by = Math.round(sy + th/2);

  // ── Soft ground shadow — grounds the tree (Kairosoft polish) ──
  ctx.save();
  ctx.fillStyle = 'rgba(40,60,30,0.18)';
  ctx.beginPath();
  ctx.ellipse(bx, by + Math.round(th*0.05),
              Math.round(crownR*0.95), Math.round(crownR*0.34), 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Trunk — height reaches exactly to crown bottom so trunk and crown connect
  const trW = Math.max(3, Math.round(tw*0.09));
  const trH = treeH - crownR;   // trunk top meets crown bottom edge
  ctx.fillStyle = '#7A4820';
  ctx.fillRect(bx - Math.round(trW/2), by - trH, trW, trH);
  ctx.fillStyle = '#9A6040';
  ctx.fillRect(bx - Math.round(trW/2), by - trH, Math.round(trW*0.35), trH);

  const crX = bx;
  const crY = by - treeH;  // crown centre = anchor − treeH

  // Seed-based foliage palette → natural variation [shadow, main, highlight]
  const PALETTES = [
    ['#2F7C32','#4DC045','#8FE06A'],
    ['#2A6E34','#43B252','#7FD562'],
    ['#357A2A','#5BC04A','#9CE070'],
  ];
  const pal = PALETTES[Math.abs(seed) % PALETTES.length];

  // Fuller canopy = 3 overlapping blobs (center + two lower sides)
  const blobs = [
    [crX,                           crY,                           crownR],
    [crX - Math.round(crownR*0.62), crY + Math.round(crownR*0.34), Math.round(crownR*0.74)],
    [crX + Math.round(crownR*0.62), crY + Math.round(crownR*0.34), Math.round(crownR*0.74)],
  ];

  // Shadow layer (offset down-right)
  ctx.fillStyle = pal[0];
  for (const [x, y, r] of blobs) {
    ctx.beginPath();
    ctx.arc(x + Math.round(crownR*0.10), y + Math.round(crownR*0.12), r, 0, Math.PI*2);
    ctx.fill();
  }
  // Main foliage
  ctx.fillStyle = pal[1];
  for (const [x, y, r] of blobs) {
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fill();
  }
  // Highlight (top-left of main blob)
  ctx.fillStyle = pal[2];
  ctx.beginPath();
  ctx.arc(crX - Math.round(crownR*0.26), crY - Math.round(crownR*0.26),
          Math.round(crownR*0.46), 0, Math.PI*2);
  ctx.fill();
}

// ============================================================
// INTERIOR BACK WALLS  (Kairosoft "open-box dollhouse" style)
// Draws the two back interior wall faces visible above the floor level.
// Back-left  wall: exposed when no same-building tile to the LEFT  (col−1)
// Back-right wall: exposed when no same-building tile ABOVE (row−1)
// These walls go UP from the back edges of the isometric diamond.
// ============================================================
function drawBuildingBackWall(sx, sy, col, row, grid, WH) {
  if (WH < 4 || TILE_W < 18) return;
  const tw = TILE_W, th = TILE_H;
  const locKey = tileLocMap[`${col},${row}`] || 'office';
  if (locKey === 'park' || locKey === 'town_square') return;

  const base = LOC_BASE[locKey] || '#888888';
  const ROWS = grid.length, COLS = grid[0]?.length || 0;

  const sameLocBldg = (r, c) => {
    if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return false;
    const t = grid[r][c];
    if (t !== 2 && t !== 5) return false;
    return (tileLocMap[`${c},${r}`] || 'office') === locKey;
  };

  const showBackLeft  = !sameLocBldg(row, col - 1);  // left face of back wall
  const showBackRight = !sameLocBldg(row - 1, col);  // right face of back wall
  if (!showBackLeft && !showBackRight) return;

  const outlineC  = darken(base, 0.48);
  const isCenter  = locCenterTile[locKey] === `${col},${row}`;

  // Interior wall colors: lighter than exterior (lit from above / inside)
  const intLeft  = lighten(base, 1.18);   // left wall — sun side
  const intRight = lighten(base, 1.08);   // right wall — slightly shadowed

  // Wallpaper / interior detail colors
  const WALLPAPER = {
    cafe:        '#F5D9B0', library: '#D4C4A8', office: '#C8D8DC',
    house_alice: '#FADADD', house_bob: '#CADCF5', house_carol: '#FAE0C8',
    house_diana: '#E8D8F0', house_eve: '#C8EDE8', apartment: '#DAD7C8',
  };
  const wpColor = WALLPAPER[locKey] || '#EEDCC8';

  // ── BACK-LEFT WALL ─────────────────────────────────────────
  // Diamond left edge: (sx−tw/2, sy+th/2) → (sx, sy)
  // Wall parallelogram rising by WH upward.
  if (showBackLeft) {
    const x0 = Math.round(sx - tw/2), y0 = Math.round(sy + th/2);
    const x1 = Math.round(sx),        y1 = Math.round(sy);
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.lineTo(x1, y1);
    ctx.lineTo(x1, y1 - WH);
    ctx.lineTo(x0, y0 - WH);
    ctx.closePath();
    ctx.fillStyle = intLeft;
    ctx.fill();
    ctx.strokeStyle = outlineC; ctx.lineWidth = 1.0; ctx.stroke();

    // Wallpaper fill (clipped)
    ctx.save();
    ctx.clip();
    ctx.fillStyle = wpColor;
    ctx.globalAlpha = 0.28;
    ctx.fillRect(x0 - 2, y1 - WH, (x1 - x0) + 4, WH * 0.7);
    ctx.globalAlpha = 1.0;
    // Horizontal mortar / panel lines
    ctx.strokeStyle = 'rgba(0,0,0,0.09)'; ctx.lineWidth = 0.6;
    const lc = Math.max(2, Math.round(WH / Math.max(6, tw * 0.13)));
    for (let i = 1; i < lc; i++) {
      const fy = WH * i / lc;
      ctx.beginPath();
      ctx.moveTo(x0, y0 - fy);
      ctx.lineTo(x1, y1 - fy);
      ctx.stroke();
    }
    // Interior window (center tile only)
    if (isCenter && tw >= 36 && WH >= 18) {
      const ww = Math.max(4, Math.round(tw * 0.10));
      const wh = Math.max(4, Math.round(WH * 0.36));
      const wx = Math.round((x0 + x1) / 2 - ww / 2 - tw * 0.05);
      const wy = Math.round(y1 - WH * 0.72);
      ctx.fillStyle = darken(intLeft, 0.30); ctx.globalAlpha = 1;
      ctx.fillRect(wx - 1, wy - 1, ww + 2, wh + 2);
      ctx.fillStyle = '#A8D8F0'; ctx.fillRect(wx, wy, ww, wh);
      ctx.fillStyle = 'rgba(220,248,255,0.60)'; ctx.fillRect(wx, wy, ww, Math.round(wh*0.46));
      ctx.strokeStyle = 'rgba(255,255,255,0.70)'; ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.moveTo(wx + Math.round(ww/2), wy); ctx.lineTo(wx + Math.round(ww/2), wy+wh); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(wx, wy + Math.round(wh/2)); ctx.lineTo(wx+ww, wy + Math.round(wh/2)); ctx.stroke();
    }
    ctx.restore();
    ctx.restore();
  }

  // ── BACK-RIGHT WALL ────────────────────────────────────────
  // Diamond right edge: (sx, sy) → (sx+tw/2, sy+th/2)
  if (showBackRight) {
    const x0 = Math.round(sx),        y0 = Math.round(sy);
    const x1 = Math.round(sx + tw/2), y1 = Math.round(sy + th/2);
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.lineTo(x1, y1);
    ctx.lineTo(x1, y1 - WH);
    ctx.lineTo(x0, y0 - WH);
    ctx.closePath();
    ctx.fillStyle = intRight;
    ctx.fill();
    ctx.strokeStyle = outlineC; ctx.lineWidth = 1.0; ctx.stroke();

    ctx.save();
    ctx.clip();
    ctx.fillStyle = wpColor;
    ctx.globalAlpha = 0.24;
    ctx.fillRect(x0 - 2, y0 - WH, (x1 - x0) + 4, WH * 0.7);
    ctx.globalAlpha = 1.0;
    ctx.strokeStyle = 'rgba(0,0,0,0.10)'; ctx.lineWidth = 0.6;
    const lc2 = Math.max(2, Math.round(WH / Math.max(6, tw * 0.13)));
    for (let i = 1; i < lc2; i++) {
      const fy = WH * i / lc2;
      ctx.beginPath();
      ctx.moveTo(x0, y0 - fy);
      ctx.lineTo(x1, y1 - fy);
      ctx.stroke();
    }
    if (isCenter && tw >= 36 && WH >= 18) {
      const ww = Math.max(4, Math.round(tw * 0.10));
      const wh = Math.max(4, Math.round(WH * 0.36));
      const wx = Math.round((x0 + x1) / 2 - ww / 2 + tw * 0.04);
      const wy = Math.round(y0 - WH * 0.72);
      ctx.fillStyle = darken(intRight, 0.30); ctx.globalAlpha = 1;
      ctx.fillRect(wx - 1, wy - 1, ww + 2, wh + 2);
      ctx.fillStyle = '#A8D8F0'; ctx.fillRect(wx, wy, ww, wh);
      ctx.fillStyle = 'rgba(220,248,255,0.60)'; ctx.fillRect(wx, wy, ww, Math.round(wh*0.46));
      ctx.strokeStyle = 'rgba(255,255,255,0.70)'; ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.moveTo(wx + Math.round(ww/2), wy); ctx.lineTo(wx + Math.round(ww/2), wy+wh); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(wx, wy + Math.round(wh/2)); ctx.lineTo(wx+ww, wy + Math.round(wh/2)); ctx.stroke();
    }
    ctx.restore();
    ctx.restore();
  }
}

// ============================================================
// DRAW GRID (isometric painter's order)
// ============================================================
// Draw-layer constants for the unified object sort. The ground plane (z=0,
// flat, can't occlude anything) is drawn first as a base pass; everything with
// HEIGHT is then emitted into one list and sorted back-to-front by iso depth
// (grid col+row), breaking ties by layer. This replaces the old 6 fixed passes
// and the hand-tuned depth offsets (+1.10 / +0.62) with a single comparator.
const L_FLOORDECAL = -1; // flat decals (carpets / floor patterns) — under everything
const L_BACKWALL   = 0;  // interior back walls — rise from a cell's back edges
const L_OBJECT     = 1;  // trees, furniture pieces, characters — standing on ground
const L_FACADE     = 2;  // low front walls + the building's rooftop sign

function drawGrid(agents, ts) {
  if (!sortedTiles) return;
  const grid = gameState.grid;
  const pad = Math.max(TILE_W, 120);
  const WH  = Math.round(TILE_H * 1.35);  // wall / facade height in px

  const onX = (sx) => !(sx + TILE_W < -pad || sx - TILE_W > canvas.width + pad);
  const onY = (sy, extra=0) => !(sy + TILE_H + WH + extra < -pad || sy - extra > canvas.height + pad);

  // ── BASE PASS: the flat ground plane (grass / path / water / floors /
  //    building-floor diamonds). All at z=0, drawn in iso order; a flat tile
  //    can never occlude something with height, so this is a clean base. ──
  const items = [];   // everything with HEIGHT goes here for the unified sort
  for (const [c, r, t] of sortedTiles) {
    const {x: sx, y: sy} = isoToScreen(c, r);
    if (!onX(sx) || !onY(sy, 20)) continue;
    switch (t) {
      case 0: case 6: drawGrassTile(sx, sy, c, r, t); break;
      case 1: drawPathTile(sx, sy, c, r); break;
      case 2: drawBuildingTile(sx, sy, c, r); break;
      case 4: drawWaterTile(sx, sy, c, r); break;
      case 5: drawFloorTile(sx, sy, c, r); break;
      case 3:
        drawTreeTile(sx, sy, c, r);   // grass base = ground
        // foliage has height → goes into the sorted object pass
        items.push({depth: c + r, layer: L_OBJECT, draw: () => drawTreeTrunkCrown(sx, sy, c, r)});
        break;
    }
  }

  // ── Interior back walls (one per exposed back edge of a building cell) ──
  for (const [c, r] of buildingTilesList) {
    const {x: sx, y: sy} = isoToScreen(c, r);
    if (!onX(sx) || !onY(sy)) continue;
    items.push({depth: c + r, layer: L_BACKWALL, draw: () => drawBuildingBackWall(sx, sy, c, r, grid, WH)});
  }

  // ── Furniture: every PIECE sorted individually by its own ground anchor.
  //    _drawIsoFurniture returns [{wx,wy,fn,floor}] in room-local world space;
  //    a piece at world (wx,wy) maps to iso depth = roomCenterDepth + (wy - wx),
  //    so each piece interleaves with characters and other pieces. Each piece is
  //    clipped to the open-box room interior so it can't spill onto walls. ──
  if (buildingBounds) {
    for (const [locKey, bb] of Object.entries(buildingBounds)) {
      const cx = (bb.minC + bb.maxC) / 2, cy = (bb.minR + bb.maxR) / 2;
      const {x: sx, y: sy} = isoToScreen(cx, cy);
      if (sx + TILE_W*3 < -pad || sx - TILE_W*3 > canvas.width + pad) continue;
      if (sy + TILE_H*5 < -pad || sy - TILE_H*2 > canvas.height + pad) continue;
      const N2 = isoToScreen(bb.minC, bb.minR);
      const E2 = isoToScreen(bb.maxC, bb.minR);
      const S2 = isoToScreen(bb.maxC, bb.maxR);
      const W2 = isoToScreen(bb.minC, bb.maxR);
      const clipRoom = () => {
        ctx.beginPath();
        ctx.moveTo(W2.x - TILE_W/2, W2.y + TILE_H/2);
        ctx.lineTo(W2.x - TILE_W/2, W2.y + TILE_H/2 - WH);
        ctx.lineTo(N2.x,            N2.y - WH);
        ctx.lineTo(E2.x + TILE_W/2, E2.y + TILE_H/2 - WH);
        ctx.lineTo(E2.x + TILE_W/2, E2.y + TILE_H/2);
        ctx.lineTo(S2.x,            S2.y + TILE_H);
        ctx.closePath();
        ctx.clip();
      };
      for (const p of _drawIsoFurniture(locKey, sx, sy, TILE_W, TILE_H)) {
        const fn = p.fn;
        items.push({
          depth: cx + cy + (p.wy - p.wx),
          layer: p.floor ? L_FLOORDECAL : L_OBJECT,
          draw: () => { ctx.save(); clipRoom(); fn(); ctx.restore(); },
        });
      }
    }
  }

  // ── Characters — pushed AFTER furniture so a resident at the same iso depth
  //    as a room's furniture clump renders on top of it (stable sort) ──
  for (const agent of agents || []) {
    const iso = isoToScreen(agent.x, agent.y);
    if (iso.x < -pad || iso.x > canvas.width + pad) continue;
    if (iso.y < -pad || iso.y > canvas.height + pad) continue;
    items.push({depth: agent.x + agent.y, layer: L_OBJECT, draw: () => drawCharacter(agent, ts)});
  }

  // ── Low front walls + rooftop signs (front faces of each building cell) ──
  for (const [c, r] of buildingTilesList) {
    const {x: sx, y: sy} = isoToScreen(c, r);
    if (!onX(sx) || !onY(sy)) continue;
    items.push({depth: c + r, layer: L_FACADE, draw: () => drawBuildingFacade(sx, sy, c, r, grid, WH)});
  }

  // Single back-to-front painter sort: iso depth first, then layer.
  // Array.sort is stable → equal (depth, layer) keeps insertion order
  // (tree foliage → furniture → characters).
  items.sort((a, b) => a.depth - b.depth || a.layer - b.layer);
  for (const it of items) it.draw();

  // ── Peaked roofs + their signs (only buildings with a ROOF_COLORS entry;
  //    none by default — open-top buildings draw their sign inside the facade) ──
  if (buildingBounds) {
    const roofOrder = Object.entries(buildingBounds)
      .sort(([,a],[,b]) => (a.minC + a.minR) - (b.minC + b.minR) || a.minC - b.minC);
    for (const [locKey, bb] of roofOrder) {
      if (!ROOF_COLORS[locKey]) continue;
      const {x: sx, y: sy} = isoToScreen(bb.minC, bb.minR);
      if (sx + TILE_W*4 < -pad || sx - TILE_W*4 > canvas.width+pad) continue;
      if (sy + TILE_H*8 < -pad || sy - TILE_H*4 > canvas.height+pad) continue;
      drawBuildingRoof(locKey, bb);
    }
    for (const [locKey, bb] of roofOrder) {
      if (!ROOF_COLORS[locKey]) continue;
      if (TILE_W < 30) continue;
      const centerKey = locCenterTile[locKey];
      if (!centerKey) continue;
      const [cc, cr] = centerKey.split(',').map(Number);
      const {x: sx, y: sy} = isoToScreen(cc, cr);
      const span  = Math.max(bb.maxC - bb.minC + 1, bb.maxR - bb.minR + 1);
      const roofH = Math.max(12, Math.round(TILE_H * 0.55 * Math.min(span, 3) + TILE_H * 0.25));
      _drawRooftopSign(locKey, sx, sy - roofH, TILE_W, TILE_H);
    }
  }
}

// ============================================================
// LOCATION LABELS
// ============================================================
function drawLocationLabels(locs, agents=[]) {
  if (!locs || TILE_W < 20) return;
  ctx.save();
  const fs = Math.max(8, Math.round(TILE_W * 0.22));
  ctx.font = `bold ${fs}px 'Courier New'`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  for (const [key, loc] of Object.entries(locs)) {
    const {x: sx, y: sy} = isoToScreen(loc.center[0], loc.center[1]);
    const lx = sx, ly = sy - Math.round(TILE_H * (LOC_H[key]||1.6)) - 14;
    if (lx < -80||lx > canvas.width+80||ly < -20||ly > canvas.height+20) continue;
    const blocked = agents.some(agent => {
      const ai = isoToScreen(agent.x, agent.y);
      const ax = ai.x;
      const ay = ai.y + TILE_H / 2 - Math.max(18, TILE_W * 0.45);
      return Math.abs(ax - lx) < TILE_W * 0.55 && Math.abs(ay - ly) < TILE_H * 1.4;
    });
    if (blocked) continue;

    const tw2 = ctx.measureText(loc.label).width;
    const pw = tw2 + 14, ph = fs + 7;
    roundRect(ctx, lx-pw/2, ly-ph/2, pw, ph, ph/2);
    ctx.fillStyle = 'rgba(255,255,255,0.92)'; ctx.fill();
    ctx.strokeStyle = LOC_BASE[key]||'#FF9966'; ctx.lineWidth = 1.8; ctx.stroke();
    ctx.fillStyle = '#552200'; ctx.fillText(loc.label, lx, ly);
  }
  ctx.restore();
}

// ============================================================
// CHARACTER SPRITE (pixel-art sprite sheet)
// ============================================================
function drawCharacter(agent, ts) {
  const iso = isoToScreen(agent.x, agent.y);
  const fx  = Math.round(iso.x);
  const fy  = Math.round(iso.y + TILE_H / 2);   // feet Y

  const s   = Math.max(0.4, TILE_W / 64);
  const P   = v => v * s;

  ensureSprite(agent.id);                 // lazy-load this resident's sprite
  const sheet = spriteSheets[agent.id];
  const ready = sheet?.complete && sheet.naturalWidth > 0;

  // Sprite scale: integer multiple of source pixels for crisp art
  const sc    = Math.max(1, Math.round(s * 2));
  const drawW = 16 * sc;
  const drawH = 24 * sc;
  const dx    = fx - Math.round(drawW / 2);
  const dy    = fy - drawH;                      // top of sprite

  // Head center in screen coords (sprite row ~5/24 from top)
  const headCY = dy + Math.round(drawH * 0.23);

  ctx.save();

  // Ground shadow
  ctx.globalAlpha = 0.18;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(fx, fy + Math.round(P(1.5)),
              Math.round(P(5.5)), Math.round(P(2)), 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  if (ready) {
    // ── SPRITE ──
    const frameIdx = agentSpriteInfo(agent, ts);
    const walk   = frameIdx % 4;
    const moving = agent.current_location !== agent.target_location;
    // Walk: hop up 1px on the mid-stride frames; idle: slow breathing bob.
    const bobY = moving
      ? ((walk === 1 || walk === 3) ? -sc : 0)
      : -Math.round(Math.abs(Math.sin(ts / 650)) * sc * 0.6);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(sheet, frameIdx * 16, 0, 16, 24, dx, dy + bobY, drawW, drawH);
  } else {
    // ── FALLBACK: colored block ──
    const skin = agent.skin || '#FFCC80';
    const hair = agent.hair || '#5D4037';
    const outfit = agent.color || '#88AADD';
    const px = Math.max(1, sc);
    const bob = (agent.current_location !== agent.target_location)
      ? Math.round(Math.abs(Math.sin(ts / 180)) * px)
      : 0;
    const ox = fx - 8 * px;
    const oy = dy - bob;
    ctx.fillStyle = hair;
    ctx.fillRect(ox + 3*px, oy + 0*px, 10*px, 3*px);
    ctx.fillRect(ox + 2*px, oy + 2*px, 12*px, 3*px);
    ctx.fillStyle = skin;
    ctx.fillRect(ox + 4*px, oy + 4*px, 8*px, 5*px);
    ctx.fillStyle = '#1A1020';
    ctx.fillRect(ox + 5*px, oy + 6*px, px, px);
    ctx.fillRect(ox + 10*px, oy + 6*px, px, px);
    ctx.fillStyle = outfit;
    ctx.fillRect(ox + 3*px, oy + 9*px, 10*px, 8*px);
    ctx.fillStyle = lighten(outfit, 1.18);
    ctx.fillRect(ox + 3*px, oy + 9*px, 10*px, px);
    ctx.fillStyle = darken(outfit, 0.72);
    ctx.fillRect(ox + 1*px, oy + 10*px, 2*px, 6*px);
    ctx.fillRect(ox + 13*px, oy + 10*px, 2*px, 6*px);
    ctx.fillStyle = '#33334A';
    ctx.fillRect(ox + 4*px, oy + 17*px, 3*px, 5*px);
    ctx.fillRect(ox + 9*px, oy + 17*px, 3*px, 5*px);
    ctx.fillStyle = '#201820';
    ctx.fillRect(ox + 3*px, oy + 22*px, 4*px, 2*px);
    ctx.fillRect(ox + 9*px, oy + 22*px, 4*px, 2*px);
  }

  // ── SELECTION RING ──
  if (agent.id === selectedAgent) {
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth   = Math.max(1.5, sc * 1.5);
    ctx.globalAlpha = 0.9;
    ctx.beginPath();
    ctx.arc(fx, headCY, Math.round(drawW * 0.52), 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // ── TALKING PULSE ──
  if (agent.chat_bubble) {
    const pulse = 0.45 + 0.55 * Math.abs(Math.sin(ts / 195));
    ctx.strokeStyle = '#FF9F6A';
    ctx.lineWidth   = Math.max(1, sc * 1.2);
    ctx.globalAlpha = pulse;
    ctx.beginPath();
    ctx.arc(fx, headCY, Math.round(drawW * 0.60), 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  ctx.restore();

  // ── NAME TAG ──
  if (TILE_W >= 20) {
    ctx.save();
    const nfs = Math.max(7, Math.round(P(9)));
    ctx.font = `bold ${nfs}px 'Courier New'`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const tw2 = ctx.measureText(agent.name).width;
    const nw = tw2 + 10, nh = nfs + 5;
    const ny = dy - nh - Math.round(P(2));
    roundRect(ctx, fx - nw / 2, ny, nw, nh, nh / 2);
    ctx.fillStyle = 'rgba(255,255,255,0.95)'; ctx.fill();
    ctx.strokeStyle = agent.color; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.fillStyle = '#333'; ctx.fillText(agent.name, fx, ny + nh / 2);
    ctx.restore();
  }
}

// ============================================================
// CHAT BUBBLES
// ============================================================
function drawChatBubbles(agents) {
  for (const agent of agents) {
    if (!agent.chat_bubble) continue;
    const iso = isoToScreen(agent.x, agent.y);
    const s = Math.max(0.4, TILE_W/64);
    const headTopY = Math.round(iso.y + TILE_H/2 - s*23);  // approx head top screen y
    const cx = Math.round(iso.x);

    if (cx<-140||cx>canvas.width+140||headTopY<-80||headTopY>canvas.height+80) continue;

    ctx.save();
    const fs = Math.max(9, Math.round(10*s));
    ctx.font = `${fs}px 'Courier New'`;

    const maxW = 145;
    let lines = [], cur = '';
    for (const ch of agent.chat_bubble.split('')) {
      if (ctx.measureText(cur+ch).width > maxW) { lines.push(cur); cur=ch; }
      else cur += ch;
    }
    if (cur) lines.push(cur);
    lines = lines.slice(0, 3);

    const lh = fs + 4;
    const bw = Math.max(55, Math.max(...lines.map(l=>ctx.measureText(l).width)) + 18);
    const bh = lines.length * lh + 10;
    const by = headTopY - 12;

    roundRect(ctx, cx - bw/2, by - bh, bw, bh, 8);
    ctx.fillStyle = 'rgba(255,255,255,0.96)'; ctx.fill();
    ctx.strokeStyle = agent.color; ctx.lineWidth = 2; ctx.stroke();

    // Tail
    ctx.beginPath();
    ctx.moveTo(cx-7, by-1); ctx.lineTo(cx+7, by-1); ctx.lineTo(cx, by+9);
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,255,255,0.96)'; ctx.fill();
    ctx.strokeStyle = agent.color; ctx.lineWidth = 1.8;
    ctx.beginPath();
    ctx.moveTo(cx-7, by-1); ctx.lineTo(cx, by+9);
    ctx.moveTo(cx+7, by-1); ctx.lineTo(cx, by+9);
    ctx.stroke();

    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillStyle = '#222';
    for (let i = 0; i < lines.length; i++)
      ctx.fillText(lines[i], cx, by - bh + 5 + i*lh);
    ctx.restore();
  }
}

// ============================================================
// ROUNDED RECT HELPER
// ============================================================
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

// ============================================================
// RENDER LOOP
// ============================================================
function render(ts) {
  requestAnimationFrame(render);
  animTs = ts;

  ctx.fillStyle = '#E9DAB9';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (!gameState) {
    ctx.fillStyle = '#665544';
    ctx.font = 'bold 16px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('正在连接服务器...', canvas.width/2, canvas.height/2);
    return;
  }

  // Sort characters by isometric depth (x+y) for painter's order
  const sorted = [...gameState.agents].sort((a,b) => (a.x+a.y)-(b.x+b.y));
  drawGrid(sorted, ts);
  drawBuildOverlay();
  drawChatBubbles(sorted);
  drawLocationLabels(gameState.locations, sorted);
}

// ============================================================
// CANVAS SETUP
// ============================================================
function setupCanvas() {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  const wrap = document.getElementById('canvas-wrap');
  function resize() {
    const sb = document.getElementById('sidebar');
    const hd = document.getElementById('header');
    const ft = document.getElementById('footer');
    const mobile = window.innerWidth <= 760;
    const availableH = window.innerHeight - hd.offsetHeight - ft.offsetHeight;
    const w = mobile ? window.innerWidth : window.innerWidth - sb.offsetWidth;
    const h = mobile ? Math.max(270, Math.round(availableH * 0.46)) : availableH;
    wrap.style.width = w+'px'; wrap.style.height = h+'px';
    canvas.width = w; canvas.height = h;
    if (!camInitialized) {
      camInitialized = true;
      // iso center of ~30×25 grid: (col15-row12.5)*TILE_W/2 ≈ 80px right of camX
      camX = w/2 - 80;
      camY = 60;
    }
  }
  resize();
  window.addEventListener('resize', resize);

  // Drag to pan
  canvas.addEventListener('mousedown', e => {
    isDragging = true; hasDragged = false;
    dragStart = {x:e.clientX, y:e.clientY};
    camStart  = {x:camX, y:camY};
    canvas.style.cursor = 'grabbing';
  });
  window.addEventListener('mousemove', e => {
    if (isDragging) {
      const dx = e.clientX-dragStart.x, dy = e.clientY-dragStart.y;
      if (Math.abs(dx)>3||Math.abs(dy)>3) hasDragged = true;
      camX = camStart.x + dx; camY = camStart.y + dy; return;
    }
    if (!gameState?.agents) return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX-rect.left, my = e.clientY-rect.top;
    const over = gameState.agents.some(a => {
      const iso = isoToScreen(a.x, a.y);
      return Math.hypot(mx - iso.x, my - (iso.y + TILE_H/2)) < Math.max(18, TILE_W*0.4);
    });
    canvas.style.cursor = over ? 'pointer' : 'grab';
  });
  window.addEventListener('mouseup', () => { isDragging=false; canvas.style.cursor='grab'; });
  canvas.style.cursor = 'grab';

  // Click to inspect (or, in build mode, click a block to build/manage)
  canvas.addEventListener('click', e => {
    if (hasDragged) return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX-rect.left, my = e.clientY-rect.top;

    if (buildMode) {
      handleBuildModeClick(mx, my);
      return;
    }

    if (!gameState?.agents) return;
    const hitR = Math.max(18, TILE_W*0.4);
    let hit = null;
    for (const ag of gameState.agents) {
      const iso = isoToScreen(ag.x, ag.y);
      if (Math.hypot(mx-iso.x, my-(iso.y+TILE_H/2)) < hitR) { hit=ag; break; }
    }
    if (hit) showInspector(hit, e.clientX, e.clientY);
    else hideInspector();
  });

  // Zoom (keep cursor-world-point fixed)
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const mx = e.offsetX, my = e.offsetY;
    const scale = e.deltaY < 0 ? 1.1 : 0.909;
    const newTW = Math.max(18, Math.min(128, TILE_W * scale));
    const sf = newTW / TILE_W;
    camX = mx + (camX - mx) * sf;
    camY = my + (camY - my) * sf;
    TILE_W = newTW;
    TILE_H = TILE_W / 2;
  }, {passive:false});
}

// ============================================================
// INSPECTOR
// ============================================================
function showInspector(agent, clientX, clientY) {
  selectedAgent = agent.id;
  const panel = document.getElementById('agent-inspector');
  document.getElementById('insp-dot').style.background    = agent.color;
  document.getElementById('insp-name').style.color        = agent.color;

let lastEvtSig = '';
function updateLog(events) {
  if (!events || !events.length) return;
  // The server only sends the latest 50 events, so length is pinned at 50 and
  // can't be used to detect change. Key off the newest event's identity instead.
  const last = events[events.length - 1];
  const sig = events.length + '|' + last.t + '|' + last.text;
  if (sig === lastEvtSig) return;
  lastEvtSig = sig;
  const ll = document.getElementById('log-list');
  ll.innerHTML = '';
  for (const ev of events.slice(-80).reverse()) {
    const d = document.createElement('div');
    d.className='log-entry';
    const cls  = ev.kind==='chat'?'log-chat':ev.kind==='meet'?'log-meet':ev.kind==='move'?'log-move':ev.kind==='money'?'log-money':'log-info';
    const icon = ev.kind==='chat'?'💬':ev.kind==='meet'?'✨':ev.kind==='move'?'🚶':ev.kind==='money'?'$':'ℹ';
    d.innerHTML=`<span class="log-time">${ev.t}</span><span class="log-text ${cls}">${icon} ${ev.text}</span>`;
    ll.appendChild(d);
  }
}
function applyUpdate(data) {
  // Note: regular per-tick "update" messages never change the grid/blocks
  // (those only arrive via a full "state" message, which already calls
  // buildLocMap()) — so this just keeps cheap reference fields in sync,
  // it does not re-run the 900+ tile sort.
  if (data.locations) { gameState.locations = data.locations; syncLocColors(); }
  if (data.blocks) gameState.blocks = data.blocks;
  if (data.block_bounds) gameState.block_bounds = data.block_bounds;
  if (data.house_styles) gameState.house_styles = data.house_styles;
  if (data.town_funds !== undefined) gameState.town_funds = data.town_funds;
  if (data.economy) gameState.economy = data.economy;
  if (data.agents && gameState.agents) {
    for (const na of data.agents) {
      const ex = gameState.agents.find(a=>a.id===na.id);
      if (ex) Object.assign(ex, na);
      else gameState.agents.push(na);
    }
    gameState.agents = gameState.agents.filter(a => data.agents.some(na => na.id === a.id));
  } else if (data.agents) gameState.agents = data.agents;
  if (data.events) gameState.events = data.events;
  if (data.paused !== undefined) { gameState.paused = data.paused; updatePauseButton(); }
  if (data.time) document.getElementById('clock').textContent = data.time;
  if (data.model || data.town_mood !== undefined || data.town_funds !== undefined) updateModelBadge(data);
  updateAgentCards(gameState.agents);
  updateLog(gameState.events);
  refreshInspector();
}

// ============================================================
// WEBSOCKET
// ============================================================
function connect() {
  // Guard: clear any pending reconnect timer and don't stack connections
  if (wsReconnectTimer) { clearTimeout(wsReconnectTimer); wsReconnectTimer = null; }
  if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) return;

  const proto = location.protocol==='https:'?'wss:':'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.onopen = () => {
    document.getElementById('status-bar').textContent='已连接 ✓';
    wsReconnectDelay = 3000;  // reset backoff on successful connect
  };
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type==='state') {
      gameState = msg.data;
      if (!gameState.locations) gameState.locations = LOCATION_LABELS;
      syncLocColors();
      buildLocMap();
      updateModelBadge(gameState);
      document.getElementById('clock').textContent=gameState.time||'08:00';
      updateAgentCards(gameState.agents);
      updateLog(gameState.events);
      updatePauseButton();
    } else if (msg.type==='update' && gameState) {
      applyUpdate(msg.data);
    } else if (msg.type==='chat_reply') {
      onChatReply(msg.data);
    }
  };
  ws.onclose = () => {
    const secs = Math.round(wsReconnectDelay / 1000);
    document.getElementById('status-bar').textContent = `已断开 — ${secs}s 后重连…`;
    wsReconnectTimer = setTimeout(() => {
      wsReconnectDelay = Math.min(wsReconnectDelay * 1.5, 30000);
      connect();
    }, wsReconnectDelay);
  };
  ws.onerror = () => ws.close();
}

function wsSend(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) { ws.send(JSON.stringify(obj)); return true; }
  return false;
}

function openChat(agentId) {
  const ag = gameState?.agents?.find(a => a.id === agentId);
  if (!ag) return;
  currentChatAgent = agentId;
  // Seed from the server-side persistent log so past conversation reappears
  // after a refresh and the character visibly "remembers" what you told it.
  if (!chatHistories[agentId] || chatHistories[agentId].length === 0) {
    chatHistories[agentId] = (ag.player_log || []).map(m => ({role: m.role, text: m.text}));
  }
  const dot = document.getElementById('chat-dot');
  const nm  = document.getElementById('chat-name');
  dot.style.background = ag.color || '#5BBF7B';
  nm.textContent = `与 ${ag.name} 对话`;
  nm.style.color = ag.color || '#2E7D4F';

  setTimeout(() => document.getElementById('chat-input').focus(), 50);
}
function closeChat() {
  currentChatAgent = null;
  document.getElementById('chat-panel').classList.remove('visible');
}
function renderChat() {
  const box = document.getElementById('chat-msgs');
  box.innerHTML = '';
  const hist = chatHistories[currentChatAgent] || [];
  if (!hist.length && !chatAwaitingReply) {
    const h = document.createElement('div');
    h.className = 'chat-hint';
    h.textContent = '打个招呼，开始对话吧～';
    box.appendChild(h);
  }
  for (const m of hist) {
    const d = document.createElement('div');
    d.className = 'chat-msg ' + (m.role === 'user' ? 'user' : 'agent');
    d.textContent = m.text;
    box.appendChild(d);
  }
  if (chatAwaitingReply) {
    const t = document.createElement('div');
    t.className = 'chat-msg typing';
    t.textContent = '正在思考…';
    box.appendChild(t);
  }
  box.scrollTop = box.scrollHeight;
}
function sendChat() {
  if (!currentChatAgent || chatAwaitingReply) return;
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  const hist = chatHistories[currentChatAgent];
  const priorHistory = hist.map(m => ({role:m.role, text:m.text}));
  if (!wsSend({type:'user_chat', agent_id:currentChatAgent, text, history:priorHistory})) return;
  hist.push({role:'user', text});
  input.value = '';
  chatAwaitingReply = true;
  document.getElementById('chat-send').disabled = true;
  renderChat();
}
function onChatReply(data) {
  chatAwaitingReply = false;
  document.getElementById('chat-send').disabled = false;
  if (!data || !data.ok) { renderChat(); return; }
  const hist = chatHistories[data.agent_id] || (chatHistories[data.agent_id] = []);
  hist.push({role:'agent', text:data.text});
  if (data.agent_id === currentChatAgent) renderChat();
}

// Inverse of isoToScreen: screen px -> continuous (col,row), then find which
// block rect (from gameState.blocks) contains that tile position.
function findBlockAt(mx, my) {
  if (!gameState?.blocks) return null;
  const A = (mx - camX) / (TILE_W / 2);
  const B = (my - camY) / (TILE_H / 2);
  const col = (A + B) / 2;
  const row = (B - A) / 2;
  for (const [posKey, info] of Object.entries(gameState.blocks)) {
    const [x0, y0, x1, y1] = info.rect;
    if (col >= x0 && col < x1 + 1 && row >= y0 && row < y1 + 1) {
      const [br, bc] = posKey.split(',').map(Number);
      return { br, bc, ...info };
    }
  }
  return null;
}

function handleBuildModeClick(mx, my) {
  const blk = findBlockAt(mx, my);
  if (!blk) return;
  if (blk.key) {
    const kind = gameState.locations?.[blk.key]?.kind;
    if (kind === 'house') openHouseManageModal(blk.key);
    else showBuildHint('这是镇上固定建筑，无法编辑～');
  } else {
    openBuildHouseModal(blk.br, blk.bc);
  }
}

// Highlight every block while in build mode: ghost ring (buildable beyond
// the edge), vacant lots, custom houses, and fixed buildings each get a
// distinct tint so it's clear what's clickable.
function drawBuildOverlay() {
  if (!buildMode || !gameState?.blocks) return;
  const tw = TILE_W, th = TILE_H;
  ctx.save();
  for (const info of Object.values(gameState.blocks)) {
    const [x0, y0, x1, y1] = info.rect;
    const N = isoToScreen(x0, y0);
    const E = isoToScreen(x1, y0);
    const S = isoToScreen(x1, y1);
    const W = isoToScreen(x0, y1);
    ctx.beginPath();
    ctx.moveTo(N.x,        N.y);
    ctx.lineTo(E.x + tw/2, E.y + th/2);
    ctx.lineTo(S.x,        S.y + th);
    ctx.lineTo(W.x - tw/2, W.y + th/2);
    ctx.closePath();

    let fill = null, stroke = 'rgba(120,120,120,0.4)', dash = [];
    if (info.ghost) {
      fill = 'rgba(120,200,120,0.18)'; stroke = 'rgba(70,160,90,0.9)'; dash = [6, 4];
    } else if (info.key === null) {
      fill = 'rgba(120,190,255,0.22)'; stroke = 'rgba(50,130,210,0.9)';
    } else {
      const kind = gameState.locations?.[info.key]?.kind;
      if (kind === 'house') { fill = 'rgba(255,205,110,0.16)'; stroke = 'rgba(225,150,30,0.85)'; }
    }
    ctx.setLineDash(dash);
    if (fill) { ctx.fillStyle = fill; ctx.fill(); }
    ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.restore();
}

      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ house_key: currentHouseKey }),
    });
    const data = await resp.json();
    if (resp.ok && data.status === 'ok') {
      closeHouseManageModal();
    } else {
      document.getElementById('hm-msg').style.color = '#f44336';
      document.getElementById('hm-msg').textContent = data.error || '拆除失败';
    }
  } catch (e) {
    document.getElementById('hm-msg').style.color = '#f44336';
    document.getElementById('hm-msg').textContent = '网络错误：' + e.message;
  } finally {
    btn.disabled = false; btn.textContent = '🔨 拆除房屋';
  }
}

// ============================================================
// ADD-AGENT MODAL
// ============================================================
function openAddAgentModal() {
  const sel = document.getElementById('f-home');
  sel.innerHTML = '';
  if (gameState && gameState.locations) {
    Object.entries(gameState.locations).forEach(([key, loc]) => {
      const opt = document.createElement('option');
      opt.value = key;
      opt.textContent = loc.label || key;
      if (key === 'apartment') opt.selected = true;
      sel.appendChild(opt);
    });
  }
  document.getElementById('modal-msg').textContent = '';
  document.getElementById('f-name').value = '';
  document.getElementById('f-job').value = '';
  document.getElementById('f-personality').value = '';
  document.getElementById('f-background').value = '';
  document.getElementById('f-goals').value = '';
  document.getElementById('f-speaking-rules').value = '';
  document.getElementById('add-agent-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 100);
}

function closeAddAgentModal() {
  document.getElementById('add-agent-overlay').classList.remove('open');
}

async function submitNewAgent() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) {
    document.getElementById('modal-msg').textContent = '请输入姓名 ⚠';
    return;
  }
  const body = {
    name,
    occupation: document.getElementById('f-job').value.trim() || '居民',
    personality: document.getElementById('f-personality').value.trim()
      || `${name}是一个友善开朗的小镇居民。`,
    background: document.getElementById('f-background').value.trim(),
    goals: parseListField(document.getElementById('f-goals').value),
    speaking_rules: parseListField(document.getElementById('f-speaking-rules').value),
    home: document.getElementById('f-home').value || 'apartment',
    color: document.getElementById('f-color').value,
    skin: document.getElementById('f-skin').value,
    hair: document.getElementById('f-hair').value,
  };
  const btn = document.getElementById('modal-submit');
  btn.disabled = true;
  btn.textContent = '添加中…';
  try {
    const resp = await fetch('/api/add-agent', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await resp.json();
    if (resp.ok && data.status === 'ok') {
      document.getElementById('modal-msg').style.color = '#4CAF50';
      document.getElementById('modal-msg').textContent = `✓ ${name} 已加入小镇！`;
      setTimeout(() => closeAddAgentModal(), 900);
    } else {
      document.getElementById('modal-msg').style.color = '#f44336';
      document.getElementById('modal-msg').textContent = '添加失败，请重试';
    }
  } catch (e) {
    document.getElementById('modal-msg').style.color = '#f44336';
    document.getElementById('modal-msg').textContent = '网络错误：' + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = '添加';
  }
}

function parseListField(value) {
  return (value || '')
    .split(/[\n;；]+/)
    .map(s => s.trim())
    .filter(Boolean)
    .slice(0, 5);
}

(function () {
  // Load sprites and tiles
  loadSprites();
  loadTiles();

  // Setup canvas and event listeners using original setupCanvas()
  setupCanvas();

  // Wire up add-agent modal: click-outside closes, ESC closes
  document.getElementById('add-agent-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('add-agent-overlay')) closeAddAgentModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closeAddAgentModal();
      closeBuildHouseModal();
      closeHouseManageModal();
    }
  });

  // Start WebSocket and render loop
  connect();
  requestAnimationFrame(render);
})();
